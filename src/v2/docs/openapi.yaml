components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    DriverHighPriorityFilter:
      in: query
      name: highPriority
      required: false
      schema:
        type: boolean
    DriverCategoryFilter:
      in: query
      name: category
      required: false
      schema:
        type: string
        enum: [delivery, passenger]
    DriverLatFilter:
      in: query
      name: lat
      required: false
      schema:
        type: number
        format: double
    DriverLngFilter:
      in: query
      name: lng
      required: false
      schema:
        type: number
        format: double
    DriverRadiusKmFilter:
      in: query
      name: radiusKm
      required: false
      schema:
        type: number
        format: double
    DriverLimitFilter:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    DriverOffsetFilter:
      in: query
      name: offset
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
  schemas:
    RegisterRequest:
      type: object
      required: [name, email, phone, password, role]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [passenger, driver, admin]

    VerifyCodeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string

    SendCodeResponse:
      type: object
      required: [success, message, channel, sentTo]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        channel:
          type: string
          enum: [EMAIL, PHONE]
        sentTo:
          type: string
        sentAt:
          type: string
          format: date-time
          nullable: true

    SmsMonthlyUsage:
      type: object
      properties:
        provider:
          type: string
          enum: [AWS_SNS]
        month:
          type: string
        period:
          type: object
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
        totalMessages:
          type: integer
        totalSent:
          type: integer
        totalFailed:
          type: integer
        threshold:
          type: integer
        alert:
          type: boolean

    ValidationSuccessResponse:
      type: object
      required: [success, message, token, user]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        token:
          type: string
          description: JWT atualizado apos validacao para refletir o novo authStatus.
        user:
          $ref: '#/components/schemas/AuthenticatedUser'
        onboardingStatus:
          nullable: true
          oneOf:
            - $ref: '#/components/schemas/OnboardingStatus'
            - type: 'null'

    LoginRequest:
      type: object
      required: [password]
      properties:
        identifier:
          type: string
          description: Campo recomendado para email ou telefone.
        email:
          type: string
          format: email
          description: Campo alternativo legado.
        phone:
          type: string
          description: Campo alternativo legado.
        password:
          type: string
      anyOf:
        - required: [identifier]
        - required: [email]
        - required: [phone]

    LoginSuccessResponse:
      type: object
      required: [success, token, user]
      properties:
        success:
          type: boolean
          example: true
        token:
          type: string
          description: JWT do usuario autenticado.
        user:
          $ref: '#/components/schemas/AuthenticatedUser'
        onboardingStatus:
          nullable: true
          description: Presente para perfil motorista/admin.
          oneOf:
            - $ref: '#/components/schemas/OnboardingStatus'
            - type: 'null'

    OnboardingStatus:
      type: object
      required: [isCompleted, isUnderReview, canDrive, steps]
      properties:
        isCompleted:
          type: boolean
        isUnderReview:
          type: boolean
        canDrive:
          type: boolean
        steps:
          type: object
          properties:
            profilePhoto:
              $ref: '#/components/schemas/OnboardingStepWithReview'
            email:
              $ref: '#/components/schemas/OnboardingStep'
            phone:
              $ref: '#/components/schemas/OnboardingStep'
            documents:
              $ref: '#/components/schemas/OnboardingStepWithReview'
            criminalRecord:
              $ref: '#/components/schemas/OnboardingStepWithReview'
            vehicle:
              $ref: '#/components/schemas/OnboardingStepWithReview'
            vehiclePhotos:
              $ref: '#/components/schemas/OnboardingStepWithReview'

    OnboardingStep:
      type: object
      properties:
        completed:
          type: boolean

    OnboardingStepWithReview:
      type: object
      properties:
        completed:
          type: boolean
        underReview:
          type: boolean

    DriverDocument:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
        type:
          type: string
          enum: [CNH, CRLV, RG, CPF, SELFIE, OUTRO, RESIDENCE_PROOF, CRIMINAL_RECORD]
        side:
          type: string
          enum: [FRONT, BACK]
          nullable: true
        filename:
          type: string
          nullable: true
        fileUrl:
          type: string
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
        rejectionReason:
          type: string
          nullable: true
        reviewedAt:
          type: string
          format: date-time
          nullable: true

    DriverOnboardingVehicleRequest:
      type: object
      required:
        [
          userId,
          vehicleType,
          manufacturer,
          modelName,
          year,
          color,
          vehiclePlate,
          usage,
        ]
      properties:
        userId:
          type: string
          description: Ignorado pela API quando diferente do usuario autenticado.
        vehicleType:
          type: string
          enum: [carro, moto]
        manufacturer:
          type: string
        modelName:
          type: string
        year:
          type: string
        color:
          type: string
        vehiclePlate:
          type: string
        usage:
          type: string
          enum: [ENTREGAS, PASSAGEIROS, AMBOS]
        renavam:
          type: string
          nullable: true

    DriverVehicle:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        vehicleType:
          type: string
