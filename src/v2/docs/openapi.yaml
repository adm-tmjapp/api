openapi: 3.0.0
info:
  title: TMJApp API V2
  version: 2.0.0
  description: API v2 organizada por visoes (admin, passenger, driver).
servers:
  - url: http://localhost:3000/api/v2
  - url: http://api.tmjapp.com.br/api/v2
tags:
  - name: Auth V2
  - name: Admin V2
  - name: Passenger V2
  - name: Driver V2
paths:
  /auth/register:
    post:
      tags: [Auth V2]
      summary: Cadastrar novo usuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              driver:
                summary: Cadastro motorista (onboarding por etapas)
                value:
                  name: "Motorista Exemplo"
                  email: "motorista@exemplo.com"
                  phone: "81999990000"
                  password: "Senha@123"
                  role: "driver"
      responses:
        '201':
          description: Usuario cadastrado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
        '400':
          description: Dados invalidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Email ou telefone ja cadastrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /auth/login:
    post:
      tags: [Auth V2]
      summary: Login do usuario (email/telefone/identifier)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              porEmail:
                summary: Login com email no campo identifier
                value:
                  identifier: "usuario@exemplo.com"
                  password: "Senha@123"
              porTelefone:
                summary: Login com telefone no campo identifier
                value:
                  identifier: "81999999999"
                  password: "Senha@123"
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
        '400':
          description: Dados obrigatorios ausentes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: Credenciais invalidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /auth/logout:
    post:
      tags: [Auth V2]
      summary: Encerrar sessão do usuário autenticado
      responses:
        '200':
          description: Logout realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
        '401':
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /auth/onboarding-status:
    get:
      tags: [Auth V2]
      summary: Consultar status de onboarding do usuario autenticado
      responses:
        '200':
          description: Status retornado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  onboardingStatus:
                    $ref: '#/components/schemas/OnboardingStatus'
        '401':
          description: Token ausente/invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Acesso negado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /auth/onboarding-status/{id}:
    get:
      tags: [Auth V2]
      summary: Consultar onboarding por id (admin ou proprio usuario)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Status retornado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  onboardingStatus:
                    $ref: '#/components/schemas/OnboardingStatus'
        '401':
          description: Token ausente/invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Acesso negado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /auth/email/send-code:
    post:
      tags: [Auth V2]
      summary: Enviar codigo de validacao para o email do usuario autenticado
      responses:
        '200':
          description: Codigo enviado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendCodeResponse'
        '400':
          description: Falha ao enviar codigo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /auth/email/verify:
    post:
      tags: [Auth V2]
      summary: Validar email com codigo
      description: Validacao de email ativa o usuario e marca o telefone como validado temporariamente enquanto a verificacao por SMS estiver desabilitada.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyCodeRequest'
      responses:
        '200':
          description: Email validado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationSuccessResponse'
        '400':
          description: Codigo invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /auth/email/validate:
    post:
      tags: [Auth V2]
      summary: Alias para validar email com codigo
      description: Validacao de email ativa o usuario e marca o telefone como validado temporariamente enquanto a verificacao por SMS estiver desabilitada.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyCodeRequest'
      responses:
        '200':
          description: Email validado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationSuccessResponse'

  /auth/phone/send-code:
    post:
      tags: [Auth V2]
      summary: Enviar codigo de validacao para o celular do usuario autenticado via AWS SNS
      description: Endpoint mantido por compatibilidade. A ativacao do usuario nao depende temporariamente de SMS.
      responses:
        '200':
          description: Codigo enviado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendCodeResponse'
        '400':
          description: Falha ao enviar codigo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /auth/phone/verify:
    post:
      tags: [Auth V2]
      summary: Validar celular com codigo
      description: Endpoint mantido por compatibilidade. A ativacao do usuario nao depende temporariamente de SMS.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyCodeRequest'
      responses:
        '200':
          description: Celular validado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationSuccessResponse'
        '400':
          description: Codigo invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /auth/phone/validate:
    post:
      tags: [Auth V2]
      summary: Alias para validar celular com codigo
      description: Endpoint mantido por compatibilidade. A ativacao do usuario nao depende temporariamente de SMS.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyCodeRequest'
      responses:
        '200':
          description: Celular validado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationSuccessResponse'

  /admin/products:
    get:
      tags: [Admin V2]
      summary: Listar produtos
      responses:
        '200': { description: OK }
    post:
      tags: [Admin V2]
      summary: Criar produto
      responses:
        '201': { description: Criado }

  /admin/dashboard:
    get:
      tags: [Admin V2]
      summary: Dashboard agregado do backoffice
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [weekly, biweekly, monthly]
      responses:
        '200':
          description: Dashboard retornado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboardResponse'

  /admin/users:
    get:
      tags: [Admin V2]
      summary: Listar usuarios/motoristas com filtros administrativos
      parameters:
        - in: query
          name: role
          schema:
            type: string
            enum: [passenger, driver, admin]
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING_EMAIL, PENDING_PHONE, ACTIVE, BLOCKED]
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Usuarios retornados com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUsersResponse'

  /admin/users/{id}/unblock:
    put:
      tags: [Admin V2]
      summary: Desbloquear usuario administrativo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Usuario desbloqueado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    $ref: '#/components/schemas/AdminUserItem'
        '404':
          description: Usuario nao encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureErrorResponse'

  /admin/payments:
    get:
      tags: [Admin V2]
      summary: Listar pagamentos administrativos
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, completed, failed]
        - in: query
          name: method
          schema:
            type: string
            enum: [credit_card, debit_card, cash]
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Pagamentos retornados com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminPaymentsResponse'

  /admin/search:
    get:
      tags: [Admin V2]
      summary: Busca global do backoffice
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resultado de busca retornado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSearchResponse'
        '422':
          description: Busca invalida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /admin/driver-documents:
    get:
      tags: [Admin V2]
      summary: Listar documentos com dados enriquecidos do usuario
      parameters:
        - in: query
          name: user
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED]
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Documentos retornados com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDriverDocumentsResponse'

  /admin/driver-documents/{id}/approve:
    put:
      tags: [Admin V2]
      summary: Aprovar documento unitario
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Documento aprovado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDocumentActionResponse'

  /admin/driver-documents/{id}/reject:
    put:
      tags: [Admin V2]
      summary: Rejeitar documento unitario
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                rejectionReason:
                  type: string
      responses:
        '200':
          description: Documento rejeitado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDocumentActionResponse'

  /admin/driver-documents/batch/approve:
    put:
      tags: [Admin V2]
      summary: Aprovar documentos em lote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminBatchIdsRequest'
      responses:
        '200':
          description: Lote aprovado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBatchActionResponse'

  /admin/driver-documents/batch/reject:
    put:
      tags: [Admin V2]
      summary: Rejeitar documentos em lote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/AdminBatchIdsRequest'
                - type: object
                  properties:
                    rejectionReason:
                      type: string
      responses:
        '200':
          description: Lote rejeitado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBatchActionResponse'

  /admin/vehicles:
    get:
      tags: [Admin V2]
      summary: Listar veiculos com dados enriquecidos do proprietario
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED]
        - in: query
          name: userId
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Veiculos retornados com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminVehiclesResponse'

  /admin/vehicles/{id}/approve:
    put:
      tags: [Admin V2]
      summary: Aprovar veiculo unitario
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Veiculo aprovado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminVehicleActionResponse'

  /admin/vehicles/{id}/reject:
    put:
      tags: [Admin V2]
      summary: Rejeitar veiculo unitario
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Veiculo rejeitado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminVehicleActionResponse'

  /admin/vehicles/batch/approve:
    put:
      tags: [Admin V2]
      summary: Aprovar veiculos em lote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminBatchIdsRequest'
      responses:
        '200':
          description: Lote aprovado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBatchActionResponse'

  /admin/vehicles/batch/reject:
    put:
      tags: [Admin V2]
      summary: Rejeitar veiculos em lote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminBatchIdsRequest'
      responses:
        '200':
          description: Lote rejeitado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBatchActionResponse'

  /admin/audit-logs:
    get:
      tags: [Admin V2]
      summary: Listar logs de auditoria administrativa
      parameters:
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: targetType
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Logs retornados com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAuditLogsResponse'

  /admin/usage/sms/monthly:
    get:
      tags: [Admin V2]
      summary: Consultar uso mensal de SMS para alerta de consumo
      parameters:
        - in: query
          name: month
          required: false
          schema:
            type: string
          description: Mes no formato YYYY-MM. Se omitido, usa o mes atual.
      responses:
        '200':
          description: Resumo mensal de envios SMS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmsMonthlyUsage'

  /passenger/rides:
    get:
      tags: [Passenger V2]
      summary: Listar corridas do passageiro
      parameters:
        - in: query
          name: status
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PassengerRideDetail'
    post:
      tags: [Passenger V2]
      summary: Criar corrida
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PassengerCreateRideRequest'
      responses:
        '201':
          description: Criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerCreateRideResponse'

  /passenger/rides/{id}:
    get:
      tags: [Passenger V2]
      summary: Consultar detalhe da corrida do passageiro
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detalhe retornado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerRideDetail'

  /passenger/rides/{id}/checkout:
    put:
      tags: [Passenger V2]
      summary: Definir produto e metodo de pagamento da corrida
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PassengerRideCheckoutRequest'
      responses:
        '200':
          description: Checkout salvo com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerRideCheckoutResponse'

  /passenger/rides/{id}/cancel:
    patch:
      tags: [Passenger V2]
      summary: Cancelar corrida do passageiro
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PassengerCancelRideRequest'
      responses:
        '200':
          description: Corrida cancelada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerCancelRideResponse'

  /passenger/rides/{id}/status:
    get:
      tags: [Passenger V2]
      summary: Consultar status resumido da corrida
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Status retornado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerRideStatusResponse'

  /passenger/rides/{id}/realtime-token:
    post:
      tags: [Passenger V2]
      summary: Gerar token realtime do passageiro para acompanhar a corrida
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Token realtime gerado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerRealtimeTokenResponse'

  /passenger/rides/{id}/eta:
    get:
      tags: [Passenger V2]
      summary: Consultar ultima localizacao/ETA conhecido do motorista
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ETA/localizacao retornados com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerRideEtaResponse'

  /passenger/payments:
    post:
      tags: [Passenger V2]
      summary: Registrar pagamento da corrida
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PassengerCreatePaymentRequest'
      responses:
        '201':
          description: Pagamento registrado

  /passenger/payments/options:
    get:
      tags: [Passenger V2]
      summary: Consultar meios de pagamento habilitados para a corrida/contexto
      parameters:
        - in: query
          name: rideId
          schema:
            type: string
      responses:
        '200':
          description: Opcoes retornadas com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerPaymentOptionsResponse'

  /passenger/payments/methods:
    get:
      tags: [Passenger V2]
      summary: Listar metodos de pagamento salvos do passageiro
      responses:
        '200':
          description: Metodos retornados com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerPaymentMethodsResponse'
    post:
      tags: [Passenger V2]
      summary: Cadastrar novo metodo de pagamento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PassengerPaymentMethodRequest'
      responses:
        '201':
          description: Metodo criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerPaymentMethodItem'

  /passenger/payments/methods/card-tokenize:
    post:
      tags: [Passenger V2]
      summary: Tokenizar e salvar cartao do passageiro
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PassengerTokenizeCardRequest'
      responses:
        '201':
          description: Cartao salvo com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerPaymentMethodItem'
        '422':
          description: Falha de validacao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureErrorResponse'

  /passenger/payments/methods/{id}:
    delete:
      tags: [Passenger V2]
      summary: Remover metodo de pagamento
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Metodo removido com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerBasicSuccessResponse'

  /passenger/payments/methods/{id}/default:
    patch:
      tags: [Passenger V2]
      summary: Definir metodo de pagamento padrao
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Metodo padrao atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerBasicSuccessResponse'

  /passenger/rides/{rideId}/payments/pix:
    post:
      tags: [Passenger V2]
      summary: Criar pagamento PIX da corrida
      parameters:
        - in: path
          name: rideId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PassengerCreatePixPaymentRequest'
      responses:
        '201':
