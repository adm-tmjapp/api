name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: oceanic-isotope-500713-f3
  REGION: southamerica-east1
  SERVICE: tmjapp-api
  REPOSITORY: tmjapp

jobs:
  deploy:
    name: Build and deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker authentication
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build image
        run: |
          docker build \
            -t "${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${SERVICE}:${GITHUB_SHA}" \
            -t "${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${SERVICE}:latest" \
            .

      - name: Push image
        run: |
          docker push "${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${SERVICE}:${GITHUB_SHA}"
          docker push "${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${SERVICE}:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --project "${PROJECT_ID}" \
            --image "${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${SERVICE}:${GITHUB_SHA}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 2 \
            --cpu 1 \
            --memory 512Mi \
            --concurrency 80 \
            --timeout 60s \
            --port 8080 \
            --set-env-vars NODE_ENV=production \
            --update-secrets MONGO_URI=tmjapp-mongo-uri:latest,JWT_SECRET=tmjapp-jwt-secret:latest,MAIL_FROM=tmjapp-mail-from:latest,MAIL_HOST=tmjapp-mail-host:latest,MAIL_PORT=tmjapp-mail-port:latest,MAIL_USER=tmjapp-mail-user:latest,MAIL_PASS=tmjapp-mail-pass:latest,AWS_ACCESS_KEY_ID=tmjapp-aws-access-key-id:latest,AWS_SECRET_ACCESS_KEY=tmjapp-aws-secret-access-key:latest,AWS_REGION=tmjapp-aws-region:latest,AWS_S3_BUCKET_NAME=tmjapp-aws-s3-bucket-name:latest,FIREBASE_SERVICE_ACCOUNT_JSON=tmjapp-firebase-service-account-json:latest,FIREBASE_DATABASE_URL=tmjapp-firebase-database-url:latest,ASAAS_API_KEY=tmjapp-asaas-api-key:latest,ASAAS_BASE_URL=tmjapp-asaas-base-url:latest,SWAGGER_ACCESS_CODE=tmjapp-swagger-access-code:latest,API_PUBLIC_BASE_URL=tmjapp-api-public-base-url:latest
